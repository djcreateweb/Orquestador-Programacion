<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Presentia · previsualización</title>
    <!-- Favicon inline (data-URI): evita la petición 404 a /favicon.ico en dev. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='4' fill='%232f5fbf'/%3E%3C/svg%3E" />
    <!-- Anti-FOUC: fija el tema en <html> ANTES del primer render (sin fogonazo). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("presentia.tema") || "auto";
          var oscuro = t === "oscuro" ||
            (t === "auto" && window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches);
          var r = document.documentElement;
          r.setAttribute("data-tema", t);
          r.setAttribute("data-tema-efectivo", oscuro ? "oscuro" : "claro");
        } catch (e) { /* sin storage: tema claro por defecto */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
