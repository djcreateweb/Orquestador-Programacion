# ============================================================
# DJ Create — Nginx Security Headers Configuration
# Copiar este bloque dentro del bloque server{} de Nginx.
# Estas cabeceras son la capa DEFINITIVA de seguridad; las
# <meta http-equiv> en index.html actuan solo como fallback.
# ============================================================

# Ocultar version de Nginx en cabeceras y paginas de error
server_tokens off;

# ── Cabeceras HTTP de seguridad ──────────────────────────────

# Clickjacking — impide que el sitio sea embebido en iframes
add_header X-Frame-Options "DENY" always;

# MIME sniffing — fuerza al navegador a respetar el Content-Type declarado
add_header X-Content-Type-Options "nosniff" always;

# XSS filter legacy (IE/Edge antiguos)
add_header X-XSS-Protection "1; mode=block" always;

# Referrer — no filtra la URL completa al navegar a dominios externos
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions Policy — deshabilita APIs de hardware no usadas
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;

# HSTS — fuerza HTTPS durante 1 año, incluye subdominios
# IMPORTANTE: solo activar cuando el sitio este 100% en HTTPS y sin mixed content
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Content Security Policy
# Sincronizar con la <meta http-equiv="Content-Security-Policy"> de index.html
# La version Nginx tiene precedencia sobre la meta tag.
#
# NOTA sobre 'unsafe-inline' en script-src:
#   Requerido por el bloque <script> inline del loader de intro en index.html.
#   Para eliminar 'unsafe-inline': extraer ese bloque a js/loader-init.js
#   e implementar nonce dinamico en Nginx con ngx_http_sub_module.
#
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none';" always;

# ── Rate limiting ────────────────────────────────────────────
# Definir en el bloque http{} de nginx.conf (fuera del server{}):
#   limit_req_zone $binary_remote_addr zone=djcreate_general:10m rate=60r/m;
#
# Aplicar en el bloque location:
#   limit_req zone=djcreate_general burst=20 nodelay;

# ── Bloquear acceso a archivos sensibles ─────────────────────
# Incluir dentro del bloque server{} junto a los location blocks:
#
# location ~* \.(env|log|sql|bak|sh|py|md|gitignore)$ {
#     deny all;
#     return 404;
# }
#
# location ~ /\. {
#     deny all;
#     return 404;
# }

